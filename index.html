              <button class="mnav-btn" id="btn-month-next">
                <svg viewBox="0 0 24 24" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="avatar sm" id="mobile-avatar">?</div>
          </div>
        </div>
        <!-- チーム切り替え（複数チーム所属時のみ表示） -->
        <div id="team-switcher" hidden style="margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;"></div>
      </header>

      <!-- デスクトップトップバー -->
      <div id="topbar">
        <div class="topbar-title" id="topbar-title">ホーム</div>
        <div class="topbar-right">
          <div class="month-nav">
            <button class="mnav-btn" id="btn-month-prev-d">
              <svg viewBox="0 0 24 24" width="13" height="13"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="desktop-month-label">—</span>
            <button class="mnav-btn" id="btn-month-next-d">
              <svg viewBox="0 0 24 24" width="13" height="13"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <button class="btn-add btn-add-icon" id="btn-add-desktop" title="記録を追加">
            <svg viewBox="0 0 24 24" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      <!-- 画面コンテンツ -->
      <div id="content-carousel">
        <div id="page-content"></div>
      </div>
    </div>

    <!-- ボトムナビ（モバイル） -->
    <nav id="bottom-nav">
      <div class="b-tab active" data-page="dashboard">
        <svg viewBox="0 0 24 24" class="b-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </div>
      <div class="b-tab" data-page="records">
        <svg viewBox="0 0 24 24" class="b-icon"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>記録</span>
      </div>
      <div class="b-tab-plus" id="btn-add-mobile">
        <svg viewBox="0 0 24 24" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="b-tab" data-page="accounts">
        <svg viewBox="0 0 24 24" class="b-icon"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span>口座</span>
      </div>
      <div class="b-tab" data-page="settings">
        <svg viewBox="0 0 24 24" class="b-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>設定</span>
      </div>
    </nav>

    <!-- 記録追加モーダル -->
    <div id="modal-overlay" hidden>
      <div id="modal-add-record">
        <div class="modal-handle"></div>
        <div id="modal-content"></div>
      </div>
    </div>

    <!-- キーボード上部固定の保存バー -->
    <div id="save-bar" hidden>
      <button id="save-bar-cancel">キャンセル</button>
      <button id="save-bar-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        保存する
      </button>
    </div>

  </div><!-- /#app -->

  <!-- iOS キーボード表示用ダミーinput（画面外に配置） -->
  <input id="ios-focus-trick" type="number" inputmode="numeric"
    style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;font-size:16px;"
    aria-hidden="true" tabindex="-1">
</div>

  <!-- Supabase CDN -->
  <!-- アプリJS（モジュール順） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/sound.js"></script>
  <script type="module" src="js/cache.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/db.js"></script>
  <script type="module" src="js/router.js"></script>
  <script type="module" src="js/dashboard.js"></script>
  <script type="module" src="js/add-record.js"></script>
  <script type="module" src="js/edit-record.js"></script>
  <script type="module" src="js/records.js"></script>
  <script type="module" src="js/accounts.js"></script>
  <script type="module" src="js/settings.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(r => console.log("SW registered:", r.scope))
          .catch(e => console.warn("SW failed:", e));
      });
    }
  </script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
