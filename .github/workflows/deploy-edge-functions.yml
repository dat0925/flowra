name: Deploy Edge Functions

on:
  workflow_dispatch: # 手動実行のみ（自動トリガー無効）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy flowra-ai
        run: |
          supabase functions deploy flowra-ai --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
