<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug2</title></head>
<body>
<h1>Debug2 - Import Test</h1>
<div id="log"></div>
<script type="module">
  const log = (msg, color='black') => {
    document.getElementById('log').innerHTML += `<p style="color:${color}">${msg}</p>`;
  };
  log('start');
  try {
    log('importing auth...');
    const { Auth } = await import('./js/auth.js');
    log('auth OK', 'green');
    
    log('importing router...');
    const { Router } = await import('./js/router.js');
    log('router OK', 'green');

    log('importing dashboard...');
    const { renderDashboard } = await import('./js/dashboard.js');
    log('dashboard OK', 'green');

    log('importing add-record...');
    const { renderAddRecord } = await import('./js/add-record.js');
    log('add-record OK', 'green');

    log('importing accounts...');
    const { renderAccounts } = await import('./js/accounts.js');
    log('accounts OK', 'green');

    log('importing settings...');
    const { renderSettings } = await import('./js/settings.js');
    log('settings OK', 'green');

    log('ALL IMPORTS OK!', 'blue');
  } catch(e) {
    log('ERROR: ' + e.message, 'red');
    log('Stack: ' + e.stack, 'red');
  }
</script>
</body>
</html>
